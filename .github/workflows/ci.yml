name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Testler basarisiz olsa bile calisir (if: always()) -- derlenen
      # kutuphaneleri (.so; Windows'ta ayni adim .dll/.lib uretir) indirip
      # incelemek/manuel test etmek isteyenler icin. Varsayilan olarak
      # 90 gun sonra silinir (GitHub Actions artifact retention).
      - name: Upload built libraries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alazforge-libraries-${{ github.sha }}
          path: build/*.so
          if-no-files-found: warn

      # generated_include/*/export.h dahil edilmezse tidy-check'te her
      # dosya "export.h bulunamadi" derleyici hatasiyla bastan basarisiz
      # olur (GenerateExportHeader ciktisi compile_commands.json'da
      # referans veriliyor ama diskte yoksa clang-tidy hicbir seyi
      # analiz edemez) -- gercek CI'da yakalandi.
      - name: Upload compile_commands.json + generated headers
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands
          path: |
            build/compile_commands.json
            build/generated_include

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-18
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: clang-format --dry-run
        run: |
          find src tests \( -name '*.h' -o -name '*.cpp' \) \
            | xargs clang-format-18 --dry-run --Werror

  tidy-check:
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true # bilgilendirici — bulgular henüz triyaj edilmedi
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: compile-commands
          path: build

      - name: Install clang-tidy-18
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-18

      - name: Run clang-tidy
        run: |
          find src \( -name '*.h' -o -name '*.cpp' \) \
            | xargs -I{} clang-tidy-18 -p build {}
