name: Release

# v* tag'i push edildiginde VEYA Actions sekmesinden elle tetiklendiginde
# (workflow_dispatch, tag adi girilerek) calisir: projeyi derler, testleri
# kosar ve derlenen kutuphaneleri (.so) kalici bir GitHub Release'e ekler.
# CI'daki artifact'lerin aksine Release dosyalari 90 gunde silinmez.
#
# Yeni surum cikarmak icin iki yol:
#   1) git tag v0.2.0 && git push origin v0.2.0
#   2) Actions > Release > Run workflow, tag alanina "v0.2.0" yaz
#      (tag yoksa gh release create onu main HEAD'inde otomatik olusturur)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Olusturulacak surum tag'i (orn. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write # gh release create icin gerekli

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Jolt kendi alt dizinine derleniyor; tum .so'lari tek yerde topla
      - name: Collect libraries
        run: |
          mkdir -p release-libs
          cp build/*.so release-libs/
          cp build/external/JoltPhysics/Build/*.so release-libs/ 2>/dev/null || true
          ls -la release-libs/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # tag push'unda ref_name tag'in kendisi; elle tetiklemede input'tan
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" release-libs/*.so \
            --title "AlazForge $TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes
