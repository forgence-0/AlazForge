name: Release

# v* tag'i push edildiginde calisir (orn. v0.1.0): projeyi derler, testleri
# kosar ve derlenen kutuphaneleri (.so) kalici bir GitHub Release'e ekler.
# CI'daki artifact'lerin aksine Release dosyalari 90 gunde silinmez.
#
# Yeni surum cikarmak icin:
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # gh release create icin gerekli

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Jolt kendi alt dizinine derleniyor; tum .so'lari tek yerde topla
      - name: Collect libraries
        run: |
          mkdir -p release-libs
          cp build/*.so release-libs/
          cp build/external/JoltPhysics/Build/*.so release-libs/ 2>/dev/null || true
          ls -la release-libs/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-libs/*.so \
            --title "AlazForge ${GITHUB_REF_NAME}" \
            --generate-notes
